<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Teacher portal — SSC College, Junnar</title>
  <link rel="stylesheet" href="../css/styles.css"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
</head>
<body class="dashboard-body">
  <div class="dash-layout">
    <aside class="dash-side">
      <h2>Teacher</h2>
      <nav class="dash-nav">
        <button type="button" data-panel="subjects" class="active">My subjects</button>
        <button type="button" data-panel="students">Students</button>
        <button type="button" data-panel="marks">Marks</button>
        <button type="button" data-panel="attendance">Attendance</button>
        <button type="button" data-panel="materials">Study materials</button>
        <button type="button" data-panel="notices">Notices</button>
        <button type="button" data-panel="edit-profile">Edit Profile</button>
      </nav>
      <a class="btn secondary small mt-3" href="../index.html" style="display:inline-block;text-decoration:none;">Public site</a>
      <button type="button" class="btn danger small mt-2" id="logout-btn">Logout</button>
    </aside>
    <main class="dash-main">
      <div class="dash-top">
        <h1 style="margin:0;font-size:1.25rem;">Faculty workspace</h1>
        <span class="small" id="who"></span>
      </div>

      <section class="dash-panel active" data-panel="subjects">
        <div class="card"><h3>Assigned subjects</h3><ul id="subj-list" class="small"></ul></div>
      </section>

      <section class="dash-panel" data-panel="students">
        <div class="card">
          <h3>Students in your classes</h3>
          <div class="table-wrap"><table class="table small" id="tbl-stu"><thead><tr><th>Name</th><th>Roll</th><th>Class</th><th>Email</th></tr></thead><tbody></tbody></table></div>
        </div>
      </section>

      <section class="dash-panel" data-panel="marks">
        <div class="card">
          <h3>Enter / update marks</h3>
          <form id="form-marks" class="form-grid two">
            <div><label class="field-label">Student</label><select class="select input" id="mark-student" required></select></div>
            <div><label class="field-label">Subject</label><input class="input" id="mark-subject" required/></div>
            <div><label class="field-label">Exam name</label><input class="input" id="mark-exam" placeholder="Unit 1" required/></div>
            <div><label class="field-label">Marks obtained</label><input class="input" id="mark-obt" type="number" step="0.01" required/></div>
            <div><label class="field-label">Max marks</label><input class="input" id="mark-max" type="number" value="50" required/></div>
            <div><button class="btn" type="submit">Save marks</button></div>
          </form>
        </div>
        <div class="card mt-4"><h3>Recent entries</h3><div class="table-wrap"><table class="table small" id="tbl-marks"><thead><tr><th>Student</th><th>Subject</th><th>Exam</th><th>Score</th></tr></thead><tbody></tbody></table></div></div>
      </section>

      <section class="dash-panel" data-panel="attendance">
        <div class="card">
          <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem;">
            <h3 style="margin:0;">Mark attendance</h3>
            <span id="att-loaded-status" class="small highlight" style="display:none; font-weight:600;"></span>
          </div>
          <div class="form-grid two mt-2">
            <div><label class="field-label">Subject</label><input class="input" id="att-subject" required/></div>
            <div><label class="field-label">Date</label><input class="input" id="att-date" type="date" required/></div>
          </div>
          <div class="mt-3" style="display:flex; gap:1rem; align-items:center; justify-content:space-between; flex-wrap:wrap; border-bottom:1px solid rgba(56,189,248,0.15); padding-bottom:0.75rem;">
            <div>
              <label class="field-label" for="att-student-search">Search student name or roll</label>
              <input class="input" id="att-student-search" placeholder="Type to filter list..." style="max-width:260px; padding:0.45rem 0.75rem; border-radius:8px;" autocomplete="off"/>
            </div>
            <button type="button" class="btn secondary small" id="btn-att-toggle-all">Mark All Present</button>
          </div>
          <div id="att-rows" class="mt-3"></div>
          <button type="button" class="btn mt-3" id="att-save">Save attendance</button>
        </div>
      </section>

      <section class="dash-panel" data-panel="materials">
        <div class="card">
          <h3>Upload material (PDF / image)</h3>
          <form id="form-mat" class="form-grid">
            <div><label class="field-label">Title</label><input class="input" name="title" required/></div>
            <div><label class="field-label">Subject</label><input class="input" name="subject" required/></div>
            <div><label class="field-label">Class</label><input class="input" name="className" placeholder="FY-BA-A" required/></div>
            <div><label class="field-label">File</label><input type="file" name="file" required/></div>
            <div><button class="btn" type="submit">Upload</button></div>
          </form>
        </div>
        <div class="card mt-4"><h3>Your uploads</h3><ul id="mat-list" class="small"></ul></div>
      </section>

      <section class="dash-panel" data-panel="notices">
        <div class="card"><h3>Notices</h3><div id="teach-notices"></div></div>
      </section>

      <section class="dash-panel" data-panel="edit-profile">
        <div class="card">
          <h3>Edit Profile</h3>
          <form id="form-edit-profile" class="form-grid">
            <div style="display:flex;align-items:center;gap:1.5rem;margin-bottom:1rem;flex-wrap:wrap;">
              <div id="teacher-avatar-preview-wrap">
                <div class="faculty-avatar-placeholder" id="teacher-avatar-placeholder" style="width:80px;height:80px;border-radius:50%;border:1px solid rgba(56,189,248,0.2);background:rgba(0,0,0,0.25);display:grid;place-items:center;"></div>
                <img id="teacher-avatar-img" src="" alt="Profile picture" style="width:80px;height:80px;border-radius:50%;object-fit:cover;display:none;margin:0;border:1px solid rgba(56,189,248,0.2);"/>
              </div>
              <div>
                <label class="field-label" for="teacher-avatar-upload">Upload profile picture</label>
                <input type="file" id="teacher-avatar-upload" name="avatar" accept="image/*"/>
              </div>
            </div>
            <div>
              <label class="field-label" for="teacher-profile-name">Full Name</label>
              <input class="input" id="teacher-profile-name" name="name" required/>
            </div>
            <div>
              <label class="field-label" for="teacher-profile-phone">Phone number</label>
              <input class="input" id="teacher-profile-phone" name="phone"/>
            </div>
            <div>
              <label class="field-label" for="teacher-profile-qual">Qualifications</label>
              <input class="input" id="teacher-profile-qual" name="qualifications"/>
            </div>
            <div>
              <label class="field-label" for="teacher-profile-bio">Bio / Statement</label>
              <textarea class="input" id="teacher-profile-bio" name="bio" rows="3"></textarea>
            </div>
            <div>
              <button class="btn" type="submit">Save Changes</button>
            </div>
          </form>
        </div>
      </section>

      <p id="dash-msg" class="small mt-3"></p>
    </main>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/teacher-app.js"></script>
</body>
</html>
