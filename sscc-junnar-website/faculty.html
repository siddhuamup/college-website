<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Faculty — SSC College, Junnar</title>
  <script src="/js/theme.js"></script>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="site-header"></div>

<main id="main-content">

  <section class="container mt-4">
    <div class="card">
      <h2>Faculty</h2>
      <p class="small">The college has a strong team of about <strong class="highlight">70–75</strong> qualified and experienced faculty members. Profiles below are loaded from the college database when the server is online.</p>
    </div>
  </section>

  <section class="container mt-4">
    <div class="grid grid-3" id="faculty-grid"></div>
    <p id="faculty-note" class="small mt-3"></p>
  </section>
</main>


  <div id="site-footer"></div>
  <script src="js/layout.js"></script>
  <script src="js/app.js"></script>
  <script>
    function getInitials(name) {
      let clean = name.replace(/^(prof\.|dr\.|shri\.|mr\.|mrs\.|ms\.)\s+/i, '');
      let parts = clean.trim().split(/\s+/);
      if (parts.length >= 2) {
        return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
      }
      return parts[0] ? parts[0][0].toUpperCase() : 'F';
    }

    function getHashColor(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = str.charCodeAt(i) + ((hash << 5) - hash);
      }
      const h = Math.abs(hash) % 360;
      return `hsl(${h}, 60%, 45%)`;
    }

    function generateSvgAvatar(name) {
      const initials = getInitials(name);
      const color = getHashColor(name);
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
        <rect width="100" height="100" fill="${color}"/>
        <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="bold" font-size="38">${initials}</text>
      </svg>`;
      return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const grid = document.getElementById('faculty-grid');
      const note = document.getElementById('faculty-note');
      try {
        const res = await fetch('/api/public/faculty');
        const list = await res.json();
        if (!res.ok) throw new Error(list.error || res.statusText);
        if (!Array.isArray(list) || !list.length) {
          note.textContent = 'No faculty records in the database yet.';
          return;
        }
        list.forEach((t) => {
          const tp = t.teacherProfile || {};
          const card = document.createElement('div');
          card.className = 'card fade-in';
          const av = t.avatarUrl && String(t.avatarUrl).trim();
          const img = av
            ? `<img class="faculty-avatar" src="${escapeAttr(av)}" alt="" loading="lazy"/>`
            : `<img class="faculty-avatar" src="${generateSvgAvatar(t.name)}" alt="${escapeAttr(t.name)}" loading="lazy"/>`;
          
          const assignments = tp.assignments || [];
          const badges = Array.isArray(assignments)
            ? assignments.map(a => `<span class="assignment-badge" style="font-size: 0.72rem; padding: 0.15rem 0.4rem; border-radius: 4px; background: rgba(56, 189, 248, 0.1); color: var(--primary); font-weight: 500;">${escape(a.subject)} • ${escape(a.className)}</span>`).join(' ')
            : '';

          card.innerHTML = `
            ${img}
            <h3 style="margin-top: 0.5rem; margin-bottom: 0.25rem;">${escape(t.name)}</h3>
            <p class="small" style="font-weight: 600; color: var(--primary); margin: 0 0 0.25rem 0;">${escape(tp.designation || 'Faculty')}${tp.department ? ' • ' + escape(tp.department) : ''}</p>
            ${tp.qualifications ? `<p class="small" style="margin: 0 0 0.15rem 0;">${escape(tp.qualifications)}</p>` : ''}
            ${tp.specialization ? `<p class="small" style="margin: 0 0 0.15rem 0; opacity: 0.9;">Specialization: ${escape(tp.specialization)}</p>` : ''}
            ${tp.experience ? `<p class="small" style="margin: 0 0 0.15rem 0; opacity: 0.85;">Experience: ${escape(tp.experience)}</p>` : ''}
            ${t.bio ? `<p class="small mt-2" style="font-style: italic; opacity: 0.8; line-height: 1.35; margin-bottom: 0.5rem;">${escape(t.bio)}</p>` : ''}
            ${badges ? `<div style="display:flex; flex-wrap:wrap; gap:0.25rem; margin-top: 0.5rem; border-top: 1px dashed rgba(56, 189, 248, 0.15); padding-top: 0.5rem;">${badges}</div>` : ''}
          `;
          grid.appendChild(card);
        });
      } catch (e) {
        note.textContent = 'No records available at the moment. Please contact the college office for assistance.';
      }
    });
    function escape(s) {
      const d = document.createElement('div');
      d.textContent = s == null ? '' : String(s);
      return d.innerHTML;
    }
    function escapeAttr(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;');
    }
  </script>
</body>
</html>
