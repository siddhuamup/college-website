<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Faculty — SSC College, Junnar</title>
  <script src="/js/theme.js"></script>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
</head>
<body>
  <div id="site-header"></div>

  <section class="container mt-4">
    <div class="card">
      <h2>Faculty</h2>
      <p class="small">The college has a strong team of about <strong class="highlight">70–75</strong> qualified and experienced faculty members. Profiles below are loaded from the college database when the server is online.</p>
    </div>
  </section>

  <section class="container mt-4">
    <div class="grid grid-3" id="faculty-grid"></div>
    <p id="faculty-note" class="small mt-3"></p>
  </section>

  <div id="site-footer"></div>
  <script src="js/layout.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const grid = document.getElementById('faculty-grid');
      const note = document.getElementById('faculty-note');
      try {
        const res = await fetch('/api/public/faculty');
        const list = await res.json();
        if (!res.ok) throw new Error(list.error || res.statusText);
        if (!Array.isArray(list) || !list.length) {
          note.textContent = 'No faculty records in the database yet. Admins can add teachers from the admin portal.';
          return;
        }
        list.forEach((t) => {
          const tp = t.teacherProfile || {};
          const card = document.createElement('div');
          card.className = 'card fade-in';
          const av = t.avatarUrl && String(t.avatarUrl).trim();
          const img = av
            ? `<img class="faculty-avatar" src="${escapeAttr(av)}" alt="" loading="lazy"/>`
            : '<div class="faculty-avatar faculty-avatar-placeholder" aria-hidden="true"></div>';
          card.innerHTML = `
            ${img}
            <h3>${escape(t.name)}</h3>
            <p class="small">${escape(tp.designation || 'Faculty')} • ${escape(tp.department || '')}</p>
            <p class="small">${escape(tp.qualifications || '')}</p>
            <p class="small mt-2">${escape(t.bio || '')}</p>
          `;
          grid.appendChild(card);
        });
      } catch (e) {
        note.textContent = e.message || 'Start the college server to load faculty from the database.';
      }
    });
    function escape(s) {
      const d = document.createElement('div');
      d.textContent = s == null ? '' : String(s);
      return d.innerHTML;
    }
    function escapeAttr(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;');
    }
  </script>
</body>
</html>
