<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Reset Password — SSC College, Junnar</title>
  <script src="/js/theme.js"></script>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <style>
    .auth-card {
      max-width: 420px;
      margin: 100px auto;
      padding: 2.5rem;
      background: var(--surface);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
    }
    .strength-meter {
      height: 6px;
      width: 100%;
      background-color: var(--card-border);
      border-radius: 3px;
      margin-top: 8px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .strength-bar {
      height: 100%;
      width: 0;
      transition: width 0.3s ease, background-color 0.3s ease;
    }
    .strength-text {
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="site-header"></div>

<main id="main-content">

  <main class="container">
    <div class="auth-card">
      <h2 style="margin-top: 0; margin-bottom: 0.5rem; text-align: center; color: var(--primary);">Reset Password</h2>
      <p style="text-align: center; color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 2rem;">
        Choose a strong password to secure your account
      </p>

      <form id="reset-form" class="form-control-validate" novalidate>
        <div style="margin-bottom: 1.25rem;">
          <label class="field-label" for="newPassword">New Password</label>
          <input class="input" id="newPassword" type="password" placeholder="Enter new password" required minlength="8" style="width:100%;"/>
          <div class="strength-meter">
            <div id="strength-bar" class="strength-bar"></div>
          </div>
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <span class="strength-text" id="strength-label">Strength: None</span>
            <span class="small" style="color: var(--muted);">Min 8 chars</span>
          </div>
        </div>

        <div style="margin-bottom: 2rem;">
          <label class="field-label" for="confirmPassword">Confirm Password</label>
          <input class="input" id="confirmPassword" type="password" placeholder="Confirm new password" required style="width:100%;"/>
        </div>

        <button type="submit" class="btn" style="width: 100%; display: flex; justify-content: center; align-items: center;">
          Update Password
        </button>
      </form>
      
      <p id="reset-msg" class="small mt-3" style="text-align: center;"></p>
      
      <div style="text-align: center; margin-top: 1.5rem;">
        <a href="/login.html" class="small" style="color: var(--primary); text-decoration: none;">Back to Login</a>
      </div>
    </div>
  </main>
</main>


  <div id="site-footer"></div>
  <script src="js/layout.js"></script>
  <script src="js/app.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      const msg = document.getElementById('reset-msg');
      msg.textContent = 'Invalid or missing password reset token. Please request a new link.';
      msg.className = 'small mt-3 alert error';
      document.querySelector('form').style.display = 'none';
    }

    const newPwd = document.getElementById('newPassword');
    const confirmPwd = document.getElementById('confirmPassword');
    const strengthBar = document.getElementById('strength-bar');
    const strengthLabel = document.getElementById('strength-label');

    // Password strength check
    newPwd.addEventListener('input', () => {
      const val = newPwd.value;
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      let color = '#ef4444';
      let label = 'Weak';
      let pct = '25%';

      if (score === 0) {
        pct = '0%';
        color = 'transparent';
        label = 'None';
      } else if (score === 2) {
        pct = '50%';
        color = '#f59e0b';
        label = 'Medium';
      } else if (score >= 3) {
        pct = '100%';
        color = '#22c55e';
        label = 'Strong';
      }

      strengthBar.style.width = pct;
      strengthBar.style.backgroundColor = color;
      strengthLabel.textContent = `Strength: ${label}`;
    });

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('reset-msg');
      msg.textContent = '';
      msg.className = 'small mt-3';

      if (newPwd.value !== confirmPwd.value) {
        msg.textContent = 'Passwords do not match.';
        msg.className = 'small mt-3 alert error';
        return;
      }

      if (newPwd.value.length < 8) {
        msg.textContent = 'Password must be at least 8 characters.';
        msg.className = 'small mt-3 alert error';
        return;
      }

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword: newPwd.value })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Reset failed');

        if (window.showToast) {
          window.showToast('Password updated successfully! Redirecting...', 'success');
        } else {
          msg.textContent = 'Password updated successfully! Redirecting to login...';
          msg.className = 'small mt-3 alert success';
        }

        setTimeout(() => {
          window.location.href = '/login.html';
        }, 3000);
      } catch (err) {
        msg.textContent = err.message || 'Reset failed';
        msg.className = 'small mt-3 alert error';
      }
    });
  </script>
</body>
</html>
